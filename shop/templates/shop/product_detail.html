<!doctype html>
<html>
  <head>
    <title>{{ product.name }}</title>
  </head>
  <body>
    <h1>{{ product.name }}</h1>
    <p>{{ product.description }}</p>
    <p>Price: ${{ product.price }}</p>
    <p>Stock: {{ product.stock }}</p>
    <a href="/">Back to product list</a>
    <a href="{% url 'add_to_cart' product.pk %}">Add to Cart</a>
  </body>
</html>
